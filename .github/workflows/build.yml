name: Build Kira APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust arm64
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t arm64-v8a -o ../app/src/main/rust-libs build --release

      - name: Build Rust armv7
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t armeabi-v7a -o ../app/src/main/rust-libs build --release

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kira-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get timestamp
        id: ts
        run: echo "TS=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ts.outputs.TS }}
          name: Kira v${{ steps.ts.outputs.TS }}
          body: |
            ## Kira v3 — Full AI Agent (no Termux)
            - Real Shizuku integration — permission requested on first launch
            - Smart app opening with 40+ name mappings
            - Resendable conversation history
            - 50+ tools: screen, shell, SMS, web search, files, sensors
            - Orange/dark UI with 4-tab navigation
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
