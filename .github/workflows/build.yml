name: Build Kira APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: /home/runner/.gradle-kira

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust arm64-v8a
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t arm64-v8a -o ../app/src/main/rust-libs build --release

      - name: Build Rust armeabi-v7a
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t armeabi-v7a -o ../app/src/main/rust-libs build --release

      - name: Build Rust x86_64
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t x86_64 -o ../app/src/main/rust-libs build --release

      - name: List rust-libs
        run: find app/src/main/rust-libs -type f | sort

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create stable signing keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          [ -z "$PASS" ] && PASS="kira_stable_2024"

          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > kira.jks

          SIZE=$(wc -c < kira.jks)
          if [ "$SIZE" -lt 100 ]; then
            echo "Keystore decode failed (size=$SIZE), generating fallback"
            keytool -genkeypair \
              -alias kira \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore kira.jks \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=KiraAI,OU=KiraService,O=KiraAI,L=US,ST=US,C=US" \
              -noprompt 2>/dev/null
          fi
          echo "KEYSTORE_PATH=$(pwd)/kira.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=$PASS"           >> $GITHUB_ENV

      - name: Get version
        id: ver
        run: |
          VER=$(grep versionName app/build.gradle | grep -oP '[\d]+\.[\d]+\.[\d]+' | head -1)
          TS=$(date +'%Y%m%d-%H%M')
          echo "VER=$VER"  >> $GITHUB_OUTPUT
          echo "TS=$TS"    >> $GITHUB_OUTPUT
          echo "TAG=v${VER}-${TS}" >> $GITHUB_OUTPUT

      - name: Build signed Release APKs (all ABIs + universal)
        run: |
          ./gradlew assembleRelease --no-daemon --no-configuration-cache \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias=kira \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASS"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g"

      - name: List APK outputs
        run: find app/build/outputs/apk -type f | sort

      - name: Collect and rename APKs
        run: |
          mkdir -p dist
          VER="${{ steps.ver.outputs.VER }}"
          APKDIR="app/build/outputs/apk/release"

          for f in "$APKDIR"/*.apk; do
            [ -f "$f" ] || continue
            case "$f" in
              *universal*) cp "$f" "dist/KiraAgent-v${VER}-universal.apk" ;;
              *arm64-v8a*) cp "$f" "dist/KiraAgent-v${VER}-arm64-v8a.apk" ;;
              *armeabi-v7a*) cp "$f" "dist/KiraAgent-v${VER}-armeabi-v7a.apk" ;;
              *x86_64*)    cp "$f" "dist/KiraAgent-v${VER}-x86_64.apk" ;;
            esac
          done

          # Fallback
          if [ -z "$(ls dist/*.apk 2>/dev/null)" ]; then
            cp "$APKDIR"/*.apk "dist/KiraAgent-v${VER}.apk" 2>/dev/null || true
          fi

          echo "=== dist contents ==="
          ls -lh dist/
          echo "DIST_APKS=$(ls dist/*.apk | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KiraAgent-v${{ steps.ver.outputs.VER }}-all-abis
          path: dist/*.apk
          retention-days: 30

      - name: Read changelog
        id: cl
        run: |
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk '/^## /{i++} i==1' CHANGELOG.md | tail -n +2 | head -40)
          else
            NOTES="Automated release. See commit history for changes."
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "Kira Agent v${{ steps.ver.outputs.VER }}"
          body: |
            ## Kira Agent v${{ steps.ver.outputs.VER }}
            **Released:** ${{ steps.ver.outputs.TS }}

            ${{ steps.cl.outputs.NOTES }}

            ---
            ### Which APK to install?
            | File | Device |
            |------|--------|
            | `KiraAgent-v*-arm64-v8a.apk` | **Most phones 2016+** — recommended |
            | `KiraAgent-v*-armeabi-v7a.apk` | Older 32-bit phones |
            | `KiraAgent-v*-x86_64.apk` | Emulators, Chromebooks |
            | `KiraAgent-v*-universal.apk` | Any device (largest file) |

            ### Install
            1. Download the APK for your device
            2. Enable **Install from unknown sources**
            3. Install — same signing key every build, no uninstall needed
            4. Grant Accessibility + Shizuku for full autonomous control

            > Kira auto-checks for updates on startup via OTA engine.

            ---

            ### What's in this release

            **AI & Agent Engine**
            - Conversational AI via any OpenAI-compatible API (Groq, OpenAI, custom endpoints)
            - Autonomous agent mode (`/agent`) — multi-step task execution with tool use
            - 176+ built-in tools: app control, file ops, system settings, web, shell, and more
            - Rust v9 core engine handles all state, memory, automation logic, and OTA

            **Automation (OpenClaw)**
            - Full macro/trigger system — screen on/off, SMS, notifications, location, battery, time
            - Variable engine with `%VAR%` expansion, profiles, task scheduler
            - NanoBot DSL scripting, reactive event streams, pipeline automation
            - Visual flowchart flows (Roboru), keyword-based automation (Robot Framework style)

            **OTA Updates**
            - Automatic background update checks via GitHub Releases API
            - Three install paths: Shizuku (silent), PackageInstaller (1 tap), Intent fallback
            - SHA256 verification before install

            **UI — Catppuccin Mocha Theme**
            - Full Catppuccin Mocha color system driven by Rust theme engine
            - Galaxy star field background with gyroscope parallax
            - Dark theme default, light theme toggle available

            **Integrations**
            - Telegram bot integration — control Kira remotely
            - Shizuku/ADB bridge for privileged commands
            - Accessibility service for screen reading and UI automation
            - Vision AI (on-device OCR + optional vision model)

            ---

            ### Which APK to download?
            | File | Device |
            |------|--------|
            | `KiraAgent-v*-arm64-v8a.apk` | **Most phones (2016+) — recommended** |
            | `KiraAgent-v*-armeabi-v7a.apk` | Older 32-bit phones |
            | `KiraAgent-v*-x86_64.apk` | Emulators, Chromebooks |
            | `KiraAgent-v*-universal.apk` | Any device (larger file) |

            ### Install
            1. Download the APK for your device
            2. Enable **Install from unknown sources** in settings
            3. Install — no uninstall needed (stable signing key across all builds)

            > Kira auto-checks for updates on startup and every 6 hours via OTA.
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
