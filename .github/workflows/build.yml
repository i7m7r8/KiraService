name: Build KiraService APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup Java ───────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Setup Android SDK ────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      # ── Setup Rust ───────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust-core/Cargo.lock') }}

      # ── Build Rust for all Android targets ───────────────────────────────────
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust (arm64-v8a)
        working-directory: rust-core
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          cargo ndk -t arm64-v8a -o ../app/src/main/rust-libs build --release

      - name: Build Rust (armeabi-v7a)
        working-directory: rust-core
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          cargo ndk -t armeabi-v7a -o ../app/src/main/rust-libs build --release

      - name: Build Rust (x86_64)
        working-directory: rust-core
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          cargo ndk -t x86_64 -o ../app/src/main/rust-libs build --release

      - name: Verify Rust libs
        run: |
          find app/src/main/rust-libs -name "*.so" -exec ls -lh {} \;

      # ── Build APK ────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── Upload APK artifacts ─────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KiraService-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KiraService-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      # ── Auto-release on main push ─────────────────────────────────────────
      - name: Get version
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: KiraService v${{ steps.version.outputs.VERSION }}
          body: |
            ## KiraService — Rust-powered Android automation

            ### Install
            1. Download `KiraService-debug.apk`
            2. Enable "Install unknown apps" for your browser
            3. Install the APK
            4. Open KiraService → Enable Accessibility Service
            5. Install Shizuku → Start it → Grant permission to KiraService

            ### What's included
            - 🦀 Rust HTTP server (localhost:7070) — ultra fast, <1ms response
            - ♿ Accessibility Service — screen read, tap, type, notifications
            - ⚡ Shizuku bridge — full ADB-level control, no root
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
