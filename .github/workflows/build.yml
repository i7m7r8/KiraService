name: Build Kira v40 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust arm64
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t arm64-v8a -o ../app/src/main/rust-libs build --release

      - name: Build Rust armv7
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t armeabi-v7a -o ../app/src/main/rust-libs build --release

      - name: List rust-libs
        run: find app/src/main/rust-libs -type f | sort

      - name: Make gradlew executable
        run: chmod +x gradlew

      # gradlew uses gradle-wrapper.properties which pins Gradle 8.4
      # No manual gradle install needed — wrapper downloads it automatically
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Build Release APK (unsigned, signed with debug key)
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: List APK outputs
        run: find app/build/outputs/apk -type f | sort

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Kira-v40-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Kira-v40-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Get timestamp
        id: ts
        run: echo "TS=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v40-${{ steps.ts.outputs.TS }}
          name: Kira v40 — ${{ steps.ts.outputs.TS }}
          body: |
            ## Kira v40 — World's Most Powerful Android AI Automation Agent

            ### What's new
            - Full Tasker/MacroDroid-equivalent engine in **pure Rust**
              - 40+ trigger types: screen, battery, WiFi/BT, shake, SMS, call, NFC,
                geofence, app launch, clipboard, cron, time interval...
              - 60+ action types: HTTP, shell, volume, torch, brightness, TTS,
                open app, send SMS, notifications, variables, if/loop/wait...
              - Variable engine with %VAR% tokens + math ops
              - Named profiles: Default / Work / Home / Sleep / Car
              - Per-macro conditions (eq/gt/contains/matches...)
              - Macro run log + dedicated 500ms engine thread
            - **Fixed**: APK now correctly attached to every release
            - All v39 features preserved

            ### Install
            Download **app-debug.apk** → enable "Install unknown apps" → install.
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
