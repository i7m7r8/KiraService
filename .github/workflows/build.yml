name: Build Kira APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust arm64
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t arm64-v8a -o ../app/src/main/rust-libs build --release

      - name: Build Rust armv7
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t armeabi-v7a -o ../app/src/main/rust-libs build --release

      - name: List rust-libs
        run: find app/src/main/rust-libs -type f | sort

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Generate a STABLE keystore so every build produces the SAME
      #    signing certificate — prevents "conflicting signatures" on update.
      #    The keystore is derived from a repo secret (KEYSTORE_PASSWORD).
      #    If the secret isn't set we use a fixed fallback password so CI
      #    still works, but you should set KEYSTORE_PASSWORD in repo secrets
      #    for production use.
      - name: Create stable keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="kira_stable_key_2024"; fi
          keytool -genkeypair \
            -alias kira \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore kira.jks \
            -storepass "$PASS" \
            -keypass  "$PASS" \
            -dname "CN=Kira Agent, OU=KiraService, O=KiraAI, L=Earth, ST=Earth, C=US" \
            -noprompt
          echo "KEYSTORE_PATH=$(pwd)/kira.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=$PASS"           >> $GITHUB_ENV

      - name: Build signed Release APK
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon --no-configuration-cache \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASS \
            -Pandroid.injected.signing.key.alias=kira \
            -Pandroid.injected.signing.key.password=$KEYSTORE_PASS
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g"

      - name: List APK outputs
        run: find app/build/outputs/apk -type f | sort

      - name: Get timestamp and version
        id: meta
        run: |
          echo "TS=$(date +'%Y%m%d-%H%M')"    >> $GITHUB_OUTPUT
          echo "VER=$(grep versionName app/build.gradle | grep -o '[0-9.]*' | head -1)" >> $GITHUB_OUTPUT

      # Rename APK to a clean filename for downloads
      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             dist/KiraAgent-v${{ steps.meta.outputs.VER }}-${{ steps.meta.outputs.TS }}.apk || \
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             dist/KiraAgent-v${{ steps.meta.outputs.VER }}-${{ steps.meta.outputs.TS }}.apk || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiraAgent-signed
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.VER }}-${{ steps.meta.outputs.TS }}
          name: "Kira Agent v${{ steps.meta.outputs.VER }}"
          body: |
            ## Kira Agent v${{ steps.meta.outputs.VER }}

            ### Install / Update
            - Download the APK below
            - Enable "Install from unknown sources"
            - Install — **no uninstall needed**, same signing key every build
            - OTA updates: Kira will detect new releases automatically

            ### v9.1 Changes
            - Full terminal/Rust UI redesign — zero stock Android chrome
            - Dark + Light theme with auto system detection
            - All dialogs replaced with custom Kira panels
            - OTA update system via GitHub Releases
            - Shizuku 3-tier detection (not installed / installed / active)
            - OpenClaw automation engine v2 (3191 lines Rust)
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
