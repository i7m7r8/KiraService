name: Build Kira APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force gradlew to use the wrapper (never system gradle)
      GRADLE_USER_HOME: /home/runner/.gradle-kira

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust arm64
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t arm64-v8a -o ../app/src/main/rust-libs build --release

      - name: Build Rust armv7
        working-directory: rust-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo ndk -t armeabi-v7a -o ../app/src/main/rust-libs build --release

      - name: List rust-libs
        run: find app/src/main/rust-libs -type f | sort

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Generate a stable keystore so every build has the SAME cert.
      # Use 1024-bit RSA for speed (debug-quality, sufficient for sideload).
      # Set KEYSTORE_PASSWORD secret in repo settings for a custom password.
      - name: Create stable signing keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          [ -z "$PASS" ] && PASS="kira_stable_2024"
          keytool -genkeypair \
            -alias kira \
            -keyalg RSA -keysize 1024 \
            -validity 10000 \
            -keystore kira.jks \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Kira,O=KiraAI,C=US" \
            -noprompt 2>/dev/null
          echo "KEYSTORE_PATH=$(pwd)/kira.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=$PASS"           >> $GITHUB_ENV

      # Extract version from build.gradle for the tag
      - name: Get version
        id: ver
        run: |
          VER=$(grep versionName app/build.gradle | grep -oP '[\d]+\.[\d]+\.[\d]+' | head -1)
          TS=$(date +'%Y%m%d-%H%M')
          echo "VER=$VER"  >> $GITHUB_OUTPUT
          echo "TS=$TS"    >> $GITHUB_OUTPUT
          echo "TAG=v${VER}-${TS}" >> $GITHUB_OUTPUT

      # Build ONLY release APK (signed). No debug build needed.
      - name: Build signed Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --no-configuration-cache \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias=kira \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASS"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g"

      - name: List APK outputs
        run: find app/build/outputs/apk -type f | sort

      - name: Rename APK
        run: |
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "dist/KiraAgent-v${{ steps.ver.outputs.VER }}.apk"
          echo "APK_NAME=KiraAgent-v${{ steps.ver.outputs.VER }}.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiraAgent-${{ steps.ver.outputs.VER }}
          path: dist/*.apk
          retention-days: 30

      # Read CHANGELOG.md if present, else use auto-generated notes
      - name: Read changelog
        id: cl
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract first section (up to second ##)
            NOTES=$(awk '/^## /{i++} i==1' CHANGELOG.md | tail -n +2 | head -40)
          else
            NOTES="Automated release. See commit history for changes."
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "Kira Agent v${{ steps.ver.outputs.VER }}"
          body: |
            ## Kira Agent v${{ steps.ver.outputs.VER }}
            **Released:** ${{ steps.ver.outputs.TS }}

            ${{ steps.cl.outputs.NOTES }}

            ---
            ### Install
            1. Download **${{ env.APK_NAME }}**
            2. Enable "Install from unknown sources"
            3. Install — **no uninstall needed** (same signing key every build)

            > Kira will auto-detect this release via OTA check on startup.
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
