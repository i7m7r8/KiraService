plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.kira.service'

    defaultConfig {
        applicationId "com.kira.service"
        minSdk 26
        targetSdk 34
        versionCode 5
        versionName "5.0.0"
        ndk { abiFilters "arm64-v8a", "armeabi-v7a" }
        externalNativeBuild {
            cmake { cppFlags "" }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        debug { debuggable true }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    packagingOptions {
        jniLibs { useLegacyPackaging true }
        resources {
            excludes += ['META-INF/INDEX.LIST', 'META-INF/io.netty.versions.properties',
                         'META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/NOTICE']
        }
    }
}

dependencies {
    // Shizuku - real ADB-level access
    implementation 'dev.rikka.shizuku:api:13.1.5'
    implementation 'dev.rikka.shizuku:provider:13.1.5'

    // OkHttp - reliable HTTP (used for Telegram + API calls)
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // Gson - JSON
    implementation 'com.google.code.gson:gson:2.10.1'

    // Markwon - full Markdown rendering in chat
    implementation 'io.noties.markwon:core:4.6.2'
    implementation 'io.noties.markwon:ext-strikethrough:4.6.2'
    implementation 'io.noties.markwon:ext-tables:4.6.2'
    implementation 'io.noties.markwon:html:4.6.2'
    implementation 'io.noties.markwon:syntax-highlight:4.6.2'

    // Prism4j - syntax highlighting for code blocks
    implementation 'io.noties:prism4j:2.0.0'

    // WorkManager - background jobs (scheduled checks, proactive mode)
    implementation 'androidx.work:work-runtime:2.9.0'

    // Room - local SQLite for conversation history
    implementation 'androidx.room:room-runtime:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'

    // Jsoup - web scraping
    implementation 'org.jsoup:jsoup:1.17.2'

    // Commons IO
    implementation 'commons-io:commons-io:2.15.1'

    // Apache Commons Lang
    implementation 'org.apache.commons:commons-lang3:3.14.0'
}
