[package]
name = "kira-core"
version = "4.0.0"
edition = "2021"

[lib]
name = "kira_core"
crate-type = ["cdylib"]

[dependencies]
lazy_static = "1.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
