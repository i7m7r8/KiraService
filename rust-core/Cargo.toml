[package]
name    = "kira-core"
version = "0.0.4"
edition = "2021"

[lib]
name       = "kira_core"
crate-type = ["cdylib"]

[dependencies]
# All three are required — pinned exact major for reproducible Android builds.
lazy_static = "1.5"
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"

# Note: HTTP server, SHA-256 OTA verify, JNI bridge and all crypto use
# Rust stdlib only (std::net::TcpListener, manual SHA-256 accumulator,
# XOR-based key derivation).  No extra crates needed.

[profile.release]
opt-level     = "z"       # minimise binary size for APK
lto           = true      # link-time optimisation
codegen-units = 1         # single codegen unit for max LTO benefit
panic         = "abort"   # no unwinding — reduces binary size ~30 KB
strip         = true      # strip symbols from .so
overflow-checks = true    # catch integer overflows in release

[profile.dev]
opt-level       = 1
overflow-checks = true
