[package]
name    = "kira-core"
version = "0.0.5"
edition = "2021"

[lib]
name       = "kira_core"
crate-type = ["cdylib"]

[dependencies]
lazy_static = "1.5"
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
# jni crate — safe, correct JNI bindings (NewStringUTF, etc.)
# Required to fix SIGSEGV caused by wrong vtable offset for NewStringUTF.
jni         = { version = "0.21", default-features = false }

[profile.release]
opt-level     = "z"
lto           = true
codegen-units = 1
panic         = "abort"
strip         = true
overflow-checks = true

[profile.dev]
opt-level       = 1
overflow-checks = true
